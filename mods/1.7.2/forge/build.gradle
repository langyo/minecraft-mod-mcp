buildscript {
    repositories {
        maven { url = "https://maven.minecraftforge.net/" }
        mavenCentral()
    }
    dependencies {
        classpath "net.minecraftforge.gradle:ForgeGradle:1.2-"
    }
}

apply plugin: "net.minecraftforge.gradle.forge"

version = "1.0.0-SNAPSHOT"
group = "xyz.langyo"
archivesBaseName = "minecraft-mcp-mod"

sourceCompatibility = targetCompatibility = "1.8"

minecraft {
    version = "1.7.2-10.12.2.1161-mc172"
    mappings = "snapshot_20140918"
    runDir = "run"
}

repositories {
    mavenCentral()
    flatDir {
        dirs "../../../.maven-local/com/mcbbs/mcp/mcp-common/1.0.0-SNAPSHOT"
    }
}

dependencies {
    implementation name: "mcp-common"
    implementation "org.java-websocket:Java-WebSocket:1.5.4"
}

tasks.withType(JavaCompile) {
    options.encoding = "UTF-8"
}

jar {
    manifest {
        attributes "FMLCorePluginContainsFMLMod": "true"
    }
}
