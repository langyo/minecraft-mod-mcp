plugins {
    id 'java'
    id 'idea'
    id 'net.neoforged.moddev' version '2.0.141'
}

version = '1.0.0-SNAPSHOT'
group = 'xyz.langyo'

java.toolchain.languageVersion = JavaLanguageVersion.of(25)

repositories {
    maven {
        url = rootProject.projectDir.toPath().resolve('../../../.maven-local').toUri()
        allowInsecureProtocol = false
    }
sourceSets.main.java.srcDir '../../../mcp-common/src/main/java'

    mavenCentral()
}

dependencies {
    implementation 'org.java-websocket:Java-WebSocket:1.5.4'
}

neoForge {
    version = "26.1.2.36-beta"
    runs {
        configureEach {
            gameDirectory = project.file('run')
        }
        client {
            client()
        }
    }
    mods {
        moddevmcp {
            sourceSet sourceSets.main
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

jar {
    manifest {
        attributes 'ModSide' : 'CLIENT'
        attributes 'Automatic-Module' : 'moddevmcp.minecraft.xyz.langyo'
        attributes 'Implementation-Version' : project.version
    }
}
