plugins {
    id 'java'
    id 'idea'
    id 'eclipse'
    id 'net.minecraftforge.gradle' version '[7.0.23,8)'
}

version = '1.0.0-SNAPSHOT'
group = 'xyz.langyo'

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

minecraft {
    runs {
        configureEach {
            workingDir = layout.projectDirectory.dir('run')
            systemProperty 'eventbus.api.strictRuntimeChecks', 'true'
            systemProperty 'forge.enabledGameTestNamespaces', 'moddevmcp'
        }
        register('client')
    }
}

repositories {
    minecraft.mavenizer(it)
    maven fg.forgeMaven
    maven fg.minecraftLibsMaven
    mavenCentral()
    maven {
        url = rootProject.projectDir.toPath().resolve('../../../.maven-local').toUri()
        allowInsecureProtocol = false
    }
}

configurations {
    shade
    implementation.extendsFrom shade
}

dependencies {
    implementation minecraft.dependency('net.minecraftforge:forge:1.21.7-57.0.2')
    shade 'com.mcbbs.mcp:mcp-common:1.0.0-SNAPSHOT'
    shade('org.java-websocket:Java-WebSocket:1.5.4') {
        transitive = false
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

tasks.jar {
    manifest {
        attributes 'ModSide' : 'BOTH'
        attributes 'Automatic-Module' : 'moddevmcp.minecraft.xyz.langyo'
        attributes 'Implementation-Version' : project.version
    }
    from {
        configurations.shade.collect { it.isDirectory() ? it : zipTree(it) }
    }
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    exclude 'META-INF/versions/**'
    exclude 'module-info.class'
    exclude 'META-INF/maven/**'
    exclude 'META-INF/MANIFEST.MF'
    exclude 'META-INF/*.SF'
    exclude 'META-INF/*.DSA'
    exclude 'META-INF/*.RSA'
    exclude 'org/slf4j/**'
    exclude 'javax/**'
    exclude 'net/jcip/**'
    exclude 'com/google/**'
}
