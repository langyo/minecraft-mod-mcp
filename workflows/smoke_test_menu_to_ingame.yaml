name: "Smoke Test: Main Menu → In-Game → LookDelta"
description: |
  Full navigation smoke test with visual preview confirmation.
  Each click goes through: preview_click (draw red dot) → screenshot (visual verify) → click (execute).
  This prevents blind coordinate guessing.

setup:
  version: "1.21.7-forge-57.0.2"
  container: false
  wait_after_connect: 15

steps:
  # === PHASE 0: Wait for MC to fully load ===
  - action: wait
    seconds: 15
    comment: "Wait for Mojang splash + main menu to appear"

  - action: ctrl_on
    comment: "Enter MCP control mode (permanently decouple mouse from game)"

  - action: wait
    seconds: 2

  # === PHASE 1: Main menu screenshot baseline ===
  - action: screenshot
    name: "01_main_menu"
    comment: "Capture main menu as baseline"

  # === PHASE 2: Click "单人游戏" (Singleplayer) ===
  - action: preview_click
    x: 426
    y: 236
    label: "单人游戏"
    radius: 8
    color: "#FF0000"
    comment: "Preview: aim at Singleplayer button"

  - action: screenshot
    name: "02_preview_singleplayer"
    comment: "Visual check: is red dot on 单人游戏 button?"

  - action: click
    x: 426
    y: 236
    comment: "Execute: click Singleplayer button"

  - action: wait
    seconds: 5

  # === PHASE 3: Select World screen ===
  - action: screenshot
    name: "03_select_world"
    comment: "Should show SelectWorldScreen"

  - action: enumerate_widgets
    comment: "List all widgets on current screen for reference"

  # === PHASE 4: Select a world (click world list, then play selected) ===
  - action: preview_click
    x: 426
    y: 200
    label: "WorldList/PlaySelected"
    radius: 8
    color: "#FF0000"
    comment: "Preview: aim at world list or 'play selected' area"

  - action: screenshot
    name: "04_preview_world_select"
    comment: "Visual check: is red dot on correct element?"

  - action: click
    x: 426
    y: 200
    comment: "Execute: select/click world entry or play button"

  - action: wait
    seconds: 8

  # === PHASE 5: In-game verification ===
  - action: screenshot
    name: "05_ingame_baseline"
    comment: "Should show game world (terrain, sky, etc.)"

  # === PHASE 6: LookDelta test (rotate view) ===
  - action: look_delta
    dyaw: 90.0
    dpitch: 0.0
    comment: "Rotate yaw +90 degrees (turn right)"

  - action: wait
    seconds: 2

  - action: screenshot
    name: "06_ingame_look90"
    comment: "View should have rotated ~90 degrees right"

  - action: look_delta
    dyaw: 45.0
    dpitch: -30.0
    comment: "Rotate yaw +45, pitch -30 (look right and down)"

  - action: wait
    seconds: 2

  - action: screenshot
    name: "07_ingame_look45_30"
    comment: "View should have changed again"

  # === PHASE 7: Cleanup ===
  - action: ctrl_off
    comment: "Exit control mode, return mouse to game"
