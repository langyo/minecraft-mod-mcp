name: CI

on:
  push:
    branches: [master, main, dev]
  pull_request:
    branches: [master, main, dev]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_HOME: "C:\\Program Files\\Amazon Corretto\\jdk21.0.8_9"

jobs:
  java-build:
    name: Java Build (common + mod)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: "21"

      - name: Build mcp-common
        run: .\gradlew.bat :packages:common:clean :packages:common:publishToMavenLocal

      - name: Build mod (1.21.7/forge)
        working-directory: packages/mods/1.21.7/forge
        run: .\gradlew.bat clean jar
