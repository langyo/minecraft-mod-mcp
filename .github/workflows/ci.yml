name: CI

on:
  push:
    branches: [master, main, dev]
  pull_request:
    branches: [master, main, dev]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-common:
    name: Build Common
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-common-${{ runner.os }}-${{ hashFiles('**/settings.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-common-${{ runner.os }}-

      - name: Build common
        run: .\gradlew.bat :packages:common:clean :packages:common:publish --no-daemon --console=plain

      - name: Verify .maven-local
        shell: pwsh
        run: |
          if (-not (Test-Path ".maven-local")) {
            Write-Host "::error::.maven-local not found after publish"
            exit 1
          }
          $count = (Get-ChildItem ".maven-local" -Recurse -File).Count
          Write-Host "Files in .maven-local: $count"
          if ($count -eq 0) {
            Write-Host "::error::.maven-local is empty"
            exit 1
          }

      - name: Upload .maven-local
        uses: actions/upload-artifact@v4
        with:
          name: maven-local
          path: .maven-local/
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

  build-mods:
    name: Build (JDK ${{ matrix.jdk }})
    needs: build-common
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - jdk: "8"
            mods: |
              1.8.9/forge
              1.9.4/forge
              1.10.2/forge
              1.11.2/forge
              1.12.2/forge
              1.13.2/forge
              1.14.4/forge
              1.15.2/forge
          - jdk: "17"
            mods: |
              1.16.5/forge
              1.17.1/forge
              1.18.2/forge
              1.19.4/forge
              1.14.4/fabric
              1.15.2/fabric
              1.16.5/fabric
              1.17.1/fabric
              1.18.2/fabric
          - jdk: "21"
            mods: |
              1.20.6/forge
              1.21.7/forge
              1.20.6/fabric
              1.20.6/neoforge
              1.19.4/fabric
          - jdk: "25"
            mods: |
              26.1.2/forge
              26.1.2/neoforge
    steps:
      - uses: actions/checkout@v4

      - name: Restore .maven-local
        uses: actions/download-artifact@v4
        with:
          name: maven-local
          path: .maven-local/

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.jdk }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/jdks
          key: gradle-jdk${{ matrix.jdk }}-${{ runner.os }}-${{ hashFiles('**/build.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-jdk${{ matrix.jdk }}-${{ runner.os }}-
            gradle-common-${{ runner.os }}-

      - name: Build mods
        shell: pwsh
        env:
          GRADLE_OPTS: "-Xmx8G"
        run: |
          $ErrorActionPreference = "Stop"
          $failedMods = @()
          $mods = @'
          ${{ matrix.mods }}
          '@ -split "`n" | ForEach-Object { $_.Trim() } | Where-Object { $_ -ne "" }

          foreach ($mod in $mods) {
            $modPath = "packages/mods/$mod"
            Write-Host "`n========================================"
            Write-Host "  Building: $modPath"
            Write-Host "========================================"

            Push-Location $modPath
            try {
              $gradleVer = if (Test-Path "gradle/wrapper/gradle-wrapper.properties") { (Get-Content "gradle/wrapper/gradle-wrapper.properties" | Select-String "distributionUrl" | Select-Object -First 1) -replace '.*gradle-', '' -replace '-bin.*', '' } else { "8.0" }
              $majorVer = $gradleVer.Split('.')[0]
              $extraArgs = if ([int]$majorVer -ge 5) { "--warning-mode=summary" } else { "" }
              if ($mod -match "/fabric$") {
                $result = .\gradlew.bat clean build -x test --no-daemon --console=plain $extraArgs 2>&1
              } else {
                $result = .\gradlew.bat clean jar --no-daemon --console=plain $extraArgs 2>&1
              }
              if ($LASTEXITCODE -ne 0) {
                $errFile = "build-error.log"
                $result | Out-File -FilePath $errFile -Encoding UTF8
                Write-Host "::error file=$modPath/$errFile::Build failed for $mod"
                Write-Host $result
                $failedMods += $mod
              } else {
                Write-Host "  [OK] $mod"
              }
            } catch {
              Write-Host "::error::Exception building $mod : $_"
              $failedMods += $mod
            } finally {
              Pop-Location
            }
          }

          if ($failedMods.Count -gt 0) {
            Write-Host "::error::Failed builds: $($failedMods -join ', ')"
            exit 1
          }

      - name: Collect JARs
        shell: pwsh
        run: |
          $sha = "${{ github.sha }}".Substring(0, 7)
          $outDir = "release-jars"
          New-Item -ItemType Directory -Path $outDir -Force

          $mods = @'
          ${{ matrix.mods }}
          '@ -split "`n" | ForEach-Object { $_.Trim() } | Where-Object { $_ -ne "" }

          foreach ($mod in $mods) {
            $parts = $mod -split '/'
            $mc = $parts[0]
            $loader = $parts[1]
            $jarDir = "packages/mods/$mod/build/libs"

            if (Test-Path $jarDir) {
              Get-ChildItem $jarDir -Filter "*.jar" | ForEach-Object {
                if ($_.Name -notmatch "-sources|-dev|-slim") {
                  $newName = "minecraft-mcp-$mc-$loader-$sha.jar"
                  Copy-Item $_.FullName "$outDir/$newName"
                  Write-Host "  Collected: $newName ($('{0:N1}' -f ($_.Length / 1KB)) KB)"
                }
              }
            } else {
              Write-Host "::warning::No build/libs found for $mod"
            }
          }

          Write-Host "`nTotal JARs collected: $((Get-ChildItem $outDir).Count)"

      - uses: actions/upload-artifact@v4
        with:
          name: mods-jdk${{ matrix.jdk }}
          path: release-jars/
          retention-days: 1

  dev-release:
    name: Dev Release
    runs-on: windows-latest
    needs: build-mods
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: mods-jdk*
          path: release-jars/

      - name: Flatten and list all JARs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force

          Get-ChildItem release-jars -Recurse -Filter "*.jar" | ForEach-Object {
            Copy-Item $_.FullName "dist/" -Force
          }

          Write-Host "`n=== All JARs for dev release ==="
          Get-ChildItem dist | ForEach-Object {
            Write-Host "  $($_.Name)  ($('{0:N1}' -f ($_.Length / 1KB)) KB)"
          }
          Write-Host "Total: $((Get-ChildItem dist).Count) JARs"

      - name: Create/Update Dev Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev/${{ github.sha }}
          name: "Dev Build (${{ github.sha }})"
          body: |
            Development build from commit `${{ github.sha }}`
            Branch: `${{ github.ref_name }}`
          prerelease: true
          files: dist/*.jar

  # ============================================================
  # HEADLESS SMOKE TESTS — 24 versions, API only, fast
  # ============================================================
  headless-smoke:
    name: "Smoke ${{ matrix.mc_ver }}-${{ matrix.loader }} (JDK ${{ matrix.jdk }})"
    needs: build-mods
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - { mc_ver: "1.8.9",   loader: "forge",    jdk: "8"  }
          - { mc_ver: "1.9.4",   loader: "forge",    jdk: "8"  }
          - { mc_ver: "1.10.2",  loader: "forge",    jdk: "8"  }
          - { mc_ver: "1.11.2",  loader: "forge",    jdk: "8"  }
          - { mc_ver: "1.12.2",  loader: "forge",    jdk: "8"  }
          - { mc_ver: "1.13.2",  loader: "forge",    jdk: "8"  }
          - { mc_ver: "1.14.4",  loader: "forge",    jdk: "8"  }
          - { mc_ver: "1.15.2",  loader: "forge",    jdk: "8"  }
          - { mc_ver: "1.16.5",  loader: "forge",    jdk: "17" }
          - { mc_ver: "1.17.1",  loader: "forge",    jdk: "17" }
          - { mc_ver: "1.18.2",  loader: "forge",    jdk: "17" }
          - { mc_ver: "1.19.4",  loader: "forge",    jdk: "17" }
          - { mc_ver: "1.14.4",  loader: "fabric",   jdk: "17" }
          - { mc_ver: "1.15.2",  loader: "fabric",   jdk: "17" }
          - { mc_ver: "1.16.5",  loader: "fabric",   jdk: "17" }
          - { mc_ver: "1.17.1",  loader: "fabric",   jdk: "17" }
          - { mc_ver: "1.18.2",  loader: "fabric",   jdk: "17" }
          - { mc_ver: "1.19.4",  loader: "fabric",   jdk: "17" }
          - { mc_ver: "1.20.6",  loader: "forge",    jdk: "21" }
          - { mc_ver: "1.21.7",  loader: "forge",    jdk: "21" }
          - { mc_ver: "1.20.6",  loader: "fabric",   jdk: "21" }
          - { mc_ver: "1.20.6",  loader: "neoforge", jdk: "21" }
          - { mc_ver: "26.1.2",  loader: "forge",    jdk: "25" }
          - { mc_ver: "26.1.2",  loader: "neoforge", jdk: "25" }
    steps:
      - uses: actions/checkout@v4
      - name: Download all mod JARs
        uses: actions/download-artifact@v4
        with:
          pattern: mods-jdk*
          path: release-jars/
      - name: Flatten JARs
        run: |
          mkdir -p dist
          find release-jars -name "*.jar" -exec cp {} dist/ \;
          echo "Available JARs:"
          ls -la dist/
      - name: Find mod JAR
        id: find-jar
        run: |
          MOD_JAR=$(find dist -name "minecraft-mcp-${{ matrix.mc_ver }}-${{ matrix.loader }}-*.jar" 2>/dev/null | head -1)
          if [ -z "$MOD_JAR" ]; then
            echo "::error::No JAR found for ${{ matrix.mc_ver }}-${{ matrix.loader }}"
            ls dist/ || true
            exit 1
          fi
          echo "mod_jar=$MOD_JAR" >> $GITHUB_OUTPUT
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "${{ matrix.jdk }}"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.minecraft/assets
          key: mc-assets-${{ matrix.mc_ver }}-${{ hashFiles('scripts/launch_mc.py') }}
          restore-keys: |
            mc-assets-${{ matrix.mc_ver }}-

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb libgl1-mesa-glx libgl1-mesa-dri libx11-dev 2>/dev/null || true
      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1024x768x24 -ac -nolisten tcp &
          sleep 2
          echo "DISPLAY=:99" >> $GITHUB_ENV
          echo "LIBGL_ALWAYS_SOFTWARE=true" >> $GITHUB_ENV
          echo "GALLIUM_DRIVER=llvmpipe" >> $GITHUB_ENV
      - name: Run smoke test
        id: smoke
        run: |
          python scripts/ci_helper.py smoke \
            --mc-ver "${{ matrix.mc_ver }}" \
            --loader "${{ matrix.loader }}" \
            --jdk-ver "${{ matrix.jdk }}" \
            --mod-jar "${{ steps.find-jar.outputs.mod_jar }}" \
            --world "CI_TestWorld" \
            --output-json "report_${{ matrix.mc_ver }}_${{ matrix.loader }}.json"
      - name: Kill MC
        if: always()
        run: pkill -f "java.*minecraft" 2>/dev/null || true

  # ============================================================
  # SCREENSHOT TEST — 4 versions with llvmpipe rendering
  # ============================================================
  screenshot-test:
    name: "Screenshot ${{ matrix.mc_ver }}-${{ matrix.loader }}"
    needs: build-mods
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - { mc_ver: "1.12.2",  loader: "forge",    jdk: "8"  }
          - { mc_ver: "1.16.5",  loader: "forge",    jdk: "17" }
          - { mc_ver: "1.21.7",  loader: "forge",    jdk: "21" }
          - { mc_ver: "26.1.2",  loader: "forge",    jdk: "25" }
    steps:
      - uses: actions/checkout@v4
      - name: Download all mod JARs
        uses: actions/download-artifact@v4
        with:
          pattern: mods-jdk*
          path: release-jars/
      - name: Flatten JARs
        run: |
          mkdir -p dist
          find release-jars -name "*.jar" -exec cp {} dist/ \;
      - name: Find mod JAR
        id: find-jar
        run: |
          MOD_JAR=$(find dist -name "minecraft-mcp-${{ matrix.mc_ver }}-${{ matrix.loader }}-*.jar" 2>/dev/null | head -1)
          echo "mod_jar=$MOD_JAR" >> $GITHUB_OUTPUT
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "${{ matrix.jdk }}"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install Pillow

      - uses: actions/cache@v4
        with:
          path: ~/.minecraft/assets
          key: mc-assets-ss-${{ matrix.mc_ver }}-${{ hashFiles('scripts/launch_mc.py') }}
          restore-keys: |
            mc-assets-ss-${{ matrix.mc_ver }}-

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb libgl1-mesa-glx libgl1-mesa-dri 2>/dev/null || true
      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1280x720x24 -ac -nolisten tcp &
          sleep 2
          echo "DISPLAY=:99" >> $GITHUB_ENV
          echo "LIBGL_ALWAYS_SOFTWARE=true" >> $GITHUB_ENV
          echo "GALLIUM_DRIVER=llvmpipe" >> $GITHUB_ENV
      - name: Run screenshot test
        run: |
          python scripts/ci_helper.py screenshot-test \
            --mc-ver "${{ matrix.mc_ver }}" \
            --loader "${{ matrix.loader }}" \
            --mod-jar "${{ steps.find-jar.outputs.mod_jar }}" \
            --world "CI_TestWorld" \
            --ref-screenshot "tests/reference-screenshots/ref_${{ matrix.mc_ver }}_${{ matrix.loader }}.png" || true
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.mc_ver }}-${{ matrix.loader }}
          path: screenshots/ci/
          retention-days: 7
      - name: Kill MC
        if: always()
        run: pkill -f "java.*minecraft" 2>/dev/null || true

  # ============================================================
  # E2E SMOKE TEST — Full workflow with superflat world
  # ============================================================
  e2e-smoke:
    name: "E2E 1.21.7-forge"
    needs: build-mods
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Download all mod JARs
        uses: actions/download-artifact@v4
        with:
          pattern: mods-jdk*
          path: release-jars/
      - name: Flatten JARs
        run: |
          mkdir -p dist
          find release-jars -name "*.jar" -exec cp {} dist/ \;
      - name: Find mod JAR
        id: find-jar
        run: |
          MOD_JAR=$(find dist -name "minecraft-mcp-1.21.7-forge-*.jar" 2>/dev/null | head -1)
          echo "mod_jar=$MOD_JAR" >> $GITHUB_OUTPUT
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install Pillow

      - uses: actions/cache@v4
        with:
          path: ~/.minecraft/assets
          key: mc-assets-e2e-1.21.7-${{ hashFiles('scripts/launch_mc.py') }}
          restore-keys: |
            mc-assets-e2e-1.21.7-

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb libgl1-mesa-glx libgl1-mesa-dri 2>/dev/null || true
      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1280x720x24 -ac -nolisten tcp &
          sleep 2
          echo "DISPLAY=:99" >> $GITHUB_ENV
          echo "LIBGL_ALWAYS_SOFTWARE=true" >> $GITHUB_ENV
          echo "GALLIUM_DRIVER=llvmpipe" >> $GITHUB_ENV
      - name: Run E2E test
        id: e2e
        run: |
          python scripts/ci_helper.py e2e \
            --mc-ver "1.21.7" \
            --loader "forge" \
            --jdk-ver "21" \
            --mod-jar "${{ steps.find-jar.outputs.mod_jar }}" \
            --world "CI_TestWorld" \
            --output-json "e2e_report.json"
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: screenshots/ci/
          retention-days: 7
      - name: Kill MC
        if: always()
        run: pkill -f "java.*minecraft" 2>/dev/null || true
