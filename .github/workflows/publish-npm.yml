name: Publish npm package

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

defaults:
  run:
    working-directory: packages/minecraft-mod-mcp

jobs:
  publish:
    name: Build & Publish
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm install

      - name: Set published version from tag
        shell: bash
        run: |
          # npm reads the version from package.json, not the git tag. For
          # prerelease tags (v0.2.1-rc1) we must rewrite package.json to the
          # full tag version, otherwise the rc would publish as the base
          # version (0.2.1) and collide with the later stable release.
          # For stable tags (v0.2.1), package.json already has the right
          # version, so skip the rewrite (npm version errors if unchanged).
          TAG="${GITHUB_REF_NAME:-}"
          VERSION="${TAG#v}"
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$VERSION" != "$CURRENT" ]; then
            npm version "$VERSION" --no-git-tag-version
          fi
          echo "Publishing version: $(node -p "require('./package.json').version")"

      - name: Build
        run: npm run build

      - name: Test
        run: npm test --if-present

      - name: Determine npm dist-tag
        id: disttag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME:-}"
          # Prerelease tags (v1.2.3-rc1, -beta.2, etc.) publish under 'next'
          # so they don't replace 'latest' — `npx minecraft-mod-mcp` still
          # resolves to the last stable release.
          if [[ "$TAG" =~ -(rc|beta|alpha|pre|snapshot)[0-9]*$ ]]; then
            echo "disttag=next" >> "$GITHUB_OUTPUT"
          else
            echo "disttag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        run: npm publish --access public --tag ${{ steps.disttag.outputs.disttag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
