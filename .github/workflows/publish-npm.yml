name: Publish npm package

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

defaults:
  run:
    working-directory: packages/minecraft-mod-mcp

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      # setup-node with registry-url + id-token:write enables npm Trusted
      # Publishing (OIDC) — no NPM_TOKEN secret needed.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          always-auth: true

      - name: Install dependencies
        run: npm install

      - name: Set published version from tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME:-}"
          VERSION="${TAG#v}"
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$VERSION" != "$CURRENT" ]; then
            npm version "$VERSION" --no-git-tag-version
          fi
          echo "Publishing version: $(node -p "require('./package.json').version")"

      - name: Build
        run: npm run build

      - name: Test
        run: npm test --if-present

      - name: Determine npm dist-tag
        id: disttag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME:-}"
          if [[ "$TAG" =~ -(rc|beta|alpha|pre|snapshot)[0-9]*$ ]]; then
            echo "disttag=next" >> "$GITHUB_OUTPUT"
          else
            echo "disttag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        run: npm publish --access public --tag ${{ steps.disttag.outputs.disttag }} --provenance
