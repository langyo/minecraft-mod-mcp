name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-mods:
    name: Build All Mods
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        jdk: [8, 17, 21, 25]
        include:
          - jdk: 8
            mods: |
              1.8.9/forge
              1.9.4/forge
              1.10.2/forge
              1.11.2/forge
              1.12.2/forge
              1.13.2/forge
              1.14.4/forge
              1.15.2/forge
          - jdk: 17
            mods: |
              1.16.5/forge
              1.17.1/forge
              1.18.2/forge
              1.19.4/forge
              1.20.6/forge
              1.14.4/fabric
              1.15.2/fabric
              1.16.5/fabric
              1.17.1/fabric
              1.18.2/fabric
              1.19.4/fabric
              1.20.6/fabric
          - jdk: 21
            mods: |
              1.21.7/forge
              1.20.6/neoforge
          - jdk: 25
            mods: |
              26.1.2/forge
              26.1.2/neoforge
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK ${{ matrix.jdk }}
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: "${{ matrix.jdk }}"

      - name: Build mcp-common
        if: matrix.jdk == 21
        run: .\gradlew.bat :packages:common:clean :packages:common:publishToMavenLocal --no-daemon

      - name: Build mods (JDK ${{ matrix.jdk }})
        run: |
          $mods = @'
          ${{ matrix.mods }}
          '@ -split "`n" | ForEach-Object { $_.Trim() } | Where-Object { $_ -ne "" }
          foreach ($mod in $mods) {
            Write-Host "=== Building packages/mods/$mod ==="
            Push-Location "packages/mods/$mod"
            try {
              .\gradlew.bat clean jar --no-daemon --console=plain
              if ($LASTEXITCODE -ne 0) { throw "Gradle build failed for $mod" }
            } finally {
              Pop-Location
            }
          }

      - name: Collect JARs
        run: |
          $tag = "${{ github.ref_name }}"
          $outDir = "release-jars"
          New-Item -ItemType Directory -Path $outDir -Force
          $mods = @'
          ${{ matrix.mods }}
          '@ -split "`n" | ForEach-Object { $_.Trim() } | Where-Object { $_ -ne "" }
          foreach ($mod in $mods) {
            $parts = $mod -split '/'
            $mc = $parts[0]
            $loader = $parts[1]
            $jarDir = "packages/mods/$mod/build/libs"
            if (Test-Path $jarDir) {
              Get-ChildItem $jarDir -Filter "*.jar" | ForEach-Object {
                $newName = "minecraft-mcp-$mc-$loader-$tag.jar"
                Copy-Item $_.FullName "$outDir/$newName"
                Write-Host "Collected: $newName"
              }
            }
          }

      - uses: actions/upload-artifact@v4
        with:
          name: mods-jdk${{ matrix.jdk }}
          path: release-jars/
          retention-days: 1

  release:
    name: Create GitHub Release
    runs-on: windows-latest
    needs: build-mods
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: mods-jdk*
          path: release-jars/

      - name: Collect all JARs
        run: |
          New-Item -ItemType Directory -Path dist -Force
          Get-ChildItem release-jars -Recurse -Filter "*.jar" | ForEach-Object {
            Copy-Item $_.FullName "dist/"
            Write-Host "Adding: $($_.Name)"
          }
          Get-ChildItem dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.jar
          generate_release_notes: true
