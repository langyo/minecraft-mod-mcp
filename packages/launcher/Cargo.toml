[workspace]
resolver = "2"

members = [
    "shared/core",
    "shared/mc_version",
    "shared/mc_metadata",
    "shared/mc_launch",
    "shared/mc_forge",
    "shared/mc_settings",
    "shared/mc_auth",
    "shared/mc_download",
    "backend",
    "cli",
    "ci",
]

default-members = [
    "cli",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
authors = ["langyo <langyo.china@gmail.com>"]
license = "MIT OR Apache-2.0"
description = "Minecraft Mod MCP Launcher (MMML)"
repository = "https://github.com/langyo/minecraft-mcp"

[workspace.dependencies]

_shared_core = { path = "shared/core" }
_shared_mc_version = { path = "shared/mc_version" }
_shared_mc_metadata = { path = "shared/mc_metadata" }
_shared_mc_launch = { path = "shared/mc_launch" }
_shared_mc_forge = { path = "shared/mc_forge" }
_shared_mc_settings = { path = "shared/mc_settings" }
_shared_mc_auth = { path = "shared/mc_auth" }
_shared_mc_download = { path = "shared/mc_download" }

anyhow = "1"
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
ts-rs = { version = "10", features = ["serde-json-impl"] }

tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "time", "net", "io-util", "fs", "sync", "process"] }
futures = "0.3"

clap = { version = "4", features = ["derive"] }
dirs = "5"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "stream"] }
sha1 = "0.10"
sha2 = "0.10"
hex = "0.4"
zip = "2"
walkdir = "2"
tempfile = "3"

tauri = { version = "2", features = [] }
tauri-build = { version = "2", features = [] }

[profile.dev]
debug = 1
opt-level = 0

[profile.dev.package."*"]
debug = 0

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 16
debug = 0
