plugins {
    id "fabric-loom" version "1.0-SNAPSHOT"
}

version = "1.0.0-SNAPSHOT"
group = "xyz.langyo"

sourceCompatibility = "17"
targetCompatibility = "17"

repositories {
    mavenCentral()
    maven {
        url = "../../../../.maven-local"
    }
}

sourceSets.main.java.srcDir '../../../common/src/main/java'
sourceSets.main.resources.srcDir '../../../common/src/main/resources'

dependencies {
    minecraft "com.mojang:minecraft:1.18.2"
    mappings "net.fabricmc:yarn:1.18.2+build.4:v2"
    modImplementation "net.fabricmc:fabric-loader:0.14.9"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.76.0+1.18.2"
    implementation "org.java-websocket:Java-WebSocket:1.5.4"
    implementation "net.java.dev.jna:jna:5.15.0"
    implementation "net.java.dev.jna:jna-platform:5.15.0"
}
