buildscript {
    repositories {
        maven { url = "https://maven.minecraftforge.net/" }
        mavenCentral()
    }
    dependencies {
        classpath "net.minecraftforge.gradle:ForgeGradle:6.0.+"
    }
}

apply plugin: "net.minecraftforge.gradle"

version = "1.0.0-SNAPSHOT"
group = "xyz.langyo"
archivesBaseName = "minecraft-moddev-mcp-mod"

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

minecraft {
    mappings channel: "official", version: "1.17.1"
    runs {
        client {
            workingDirectory = file("run")
            property "forge.logging.markers", "REGISTRIES"
        }
    }
}

repositories {
    mavenCentral()
    maven {
        url = "../../../../.maven-local"
    }
}

sourceSets.main.java.srcDir '../../../common/src/main/java'
sourceSets.main.resources.srcDir '../../../common/src/main/resources'

dependencies {
    minecraft "net.minecraftforge:forge:1.17.1-37.1.1"
    implementation "org.java-websocket:Java-WebSocket:1.5.4"
    implementation 'net.java.dev.jna:jna:5.15.0'
    implementation 'net.java.dev.jna:jna-platform:5.15.0'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = "UTF-8"
}

jar {
    manifest {
        attributes "FMLCorePluginContainsFMLMod": "true"
    }
}
