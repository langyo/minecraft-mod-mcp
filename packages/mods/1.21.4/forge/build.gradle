plugins {
    id 'java'
    id 'idea'
    id 'eclipse'
    id 'net.minecraftforge.gradle' version '7.0.23'
}

version = '0.2.0-SNAPSHOT'
group = 'xyz.langyo'

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

minecraft {
    runs {
        configureEach {
            workingDir = layout.projectDirectory.dir('run')
            systemProperty 'eventbus.api.strictRuntimeChecks', 'true'
            systemProperty 'forge.enabledGameTestNamespaces', 'mcpmod'
        }
        register('client')
    }
}

repositories {
    minecraft.mavenizer(it)
    maven fg.forgeMaven
    maven fg.minecraftLibsMaven
    mavenCentral()
    maven {
        url = rootProject.projectDir.toPath().resolve('../../../.maven-local').toUri()
        allowInsecureProtocol = false
    }
}

sourceSets.main.java.srcDir '../../../common/src/main/java'
sourceSets.main.resources.srcDir '../../../common/src/main/resources'

dependencies {
    implementation minecraft.dependency('net.minecraftforge:forge:1.21.4-54.1.14')
    implementation 'org.java-websocket:Java-WebSocket:1.5.4'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

jar {
    manifest {
        attributes 'ModSide' : 'BOTH'
        attributes 'Automatic-Module' : 'xyz.langyo.minecraft.mcp.mod'
        attributes 'Implementation-Version' : project.version
    }
}

// Force minecraft-mavenizer >= 0.5.20 to avoid the IBM_SEMERU field bug
// (removed in Gradle 9; older mavenizer versions reference it via reflection).
configurations.all {
    resolutionStrategy.eachDependency { details ->
        if (details.requested.group == "net.minecraftforge" && details.requested.name == "minecraft-mavenizer") {
            details.useVersion "0.5.20"
        }
    }
}
