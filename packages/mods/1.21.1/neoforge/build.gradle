plugins {
    id 'java'
    id 'idea'
    id 'net.neoforged.moddev' version '2.0.141'
}

version = '0.2.1'
group = 'xyz.langyo'

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

repositories {
    maven {
        url = rootProject.projectDir.toPath().resolve('../../../.maven-local').toUri()
        allowInsecureProtocol = false
    }
    mavenCentral()
}

sourceSets.main.java.srcDir '../../../common/src/main/java'
sourceSets.main.resources.srcDir '../../../common/src/main/resources'

dependencies {
    implementation 'org.java-websocket:Java-WebSocket:1.5.4'
}

neoForge {
    version = "21.1.172"
    runs {
        configureEach {
            gameDirectory = project.file('run')
        }
        client {
            client()
        }
    }
    mods {
        mcpmod {
            sourceSet sourceSets.main
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

jar {
    manifest {
        attributes 'ModSide' : 'CLIENT'
        attributes 'Automatic-Module' : 'xyz.langyo.minecraft.mcp.mod'
        attributes 'Implementation-Version' : project.version
    }
}
