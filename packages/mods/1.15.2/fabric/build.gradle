plugins {
    id "fabric-loom" version "0.12-SNAPSHOT"
}

version = "1.0.0-SNAPSHOT"
group = "xyz.langyo"

sourceCompatibility = "16"
targetCompatibility = "16"

repositories {
    mavenCentral()
    maven {
        url = "../../../../.maven-local"
    }
}

sourceSets.main.java.srcDir '../../../common/src/main/java'
sourceSets.main.resources.srcDir '../../../common/src/main/resources'

dependencies {
    minecraft "com.mojang:minecraft:1.15.2"
    mappings "net.fabricmc:yarn:1.15.2+build.17:v2"
    modImplementation "net.fabricmc:fabric-loader:0.11.3"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.28.5+1.15"
    implementation "org.java-websocket:Java-WebSocket:1.5.4"
    implementation "net.java.dev.jna:jna:5.15.0"
    implementation "net.java.dev.jna:jna-platform:5.15.0"
}

tasks.withType(ProcessResources).configureEach {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}
